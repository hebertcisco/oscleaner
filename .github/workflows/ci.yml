name: 🚀 CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: 📝 Checkout
        uses: actions/checkout@v4

      - name: 🛠️ Install toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: 📦 Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: 🏗️ Build
        run: cargo build --locked --all-targets

      - name: 🧪 Test
        run: cargo test --locked --all-features
