name: Release macOS + Homebrew

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version_tag:
        description: "Tag to release (e.g., v1.1.0)"
        required: true

env:
  HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
  HOMEBREW_TAP: ${{ secrets.HOMEBREW_TAP }}
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  resolve:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.resolve_tag.outputs.tag }}
      version: ${{ steps.resolve_tag.outputs.version }}
      source_sha: ${{ steps.source_sha.outputs.source_sha }}
    steps:
      - name: Resolve release tag
        id: resolve_tag
        run: |
          set -euo pipefail
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            TAG="${GITHUB_REF_NAME}"
          else
            TAG="${{ inputs.version_tag }}"
          fi
          CLEAN="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$CLEAN" >> "$GITHUB_OUTPUT"

      - name: Compute source tarball sha256
        id: source_sha
        run: |
          set -euo pipefail
          TAG="${{ steps.resolve_tag.outputs.tag }}"
          URL="https://github.com/${{ github.repository }}/archive/refs/tags/${TAG}.tar.gz"
          curl -L "$URL" -o source.tar.gz
          SHA="$(sha256sum source.tar.gz | awk '{print $1}')"
          echo "source_sha=$SHA" >> "$GITHUB_OUTPUT"

  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    needs: resolve
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --locked --release --target ${{ matrix.target }}

      - name: Package tarball
        shell: bash
        run: |
          set -euo pipefail
          DIST="dist"
          VERSION="${{ needs.resolve.outputs.version }}"
          BIN="target/${{ matrix.target }}/release/oscleaner"
          BASE="oscleaner-v${VERSION}-${{ matrix.target }}"
          mkdir -p "$DIST"
          cp "$BIN" "$DIST/$BASE"
          tar -czf "$DIST/$BASE.tar.gz" -C "$DIST" "$BASE"

      - name: Create DMG (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          DIST="dist"
          VERSION="${{ needs.resolve.outputs.version }}"
          DMG_ROOT="$DIST/dmg-root"
          BASE="oscleaner-v${VERSION}-${{ matrix.target }}"
          mkdir -p "$DMG_ROOT"
          cp "target/${{ matrix.target }}/release/oscleaner" "$DMG_ROOT/oscleaner"
          hdiutil create -volname "oscleaner" -srcfolder "$DMG_ROOT" -ov -format UDZO "$DIST/$BASE.dmg"
          rm -rf "$DMG_ROOT"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: oscleaner-${{ matrix.target }}
          path: dist/**
          if-no-files-found: error

  release:
    runs-on: ubuntu-latest
    needs:
      - resolve
      - build
    permissions:
      contents: write
    outputs:
      tag: ${{ needs.resolve.outputs.tag }}
      version: ${{ needs.resolve.outputs.version }}
    steps:
      - name: Download built artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Prepare release assets
        run: |
          set -euo pipefail
          TAG="${{ needs.resolve.outputs.tag }}"
          mkdir -p artifacts
          mkdir -p release
          find artifacts -type f \( -name "*.tar.gz" -o -name "*.dmg" \) -exec cp {} release/ \;
          git archive --format=tar --prefix="oscleaner-${TAG}/" "${GITHUB_SHA}" | gzip -n > "release/oscleaner-${TAG}-source.tar.gz"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.resolve.outputs.tag }}
          name: oscleaner ${{ needs.resolve.outputs.tag }}
          files: release/*
          generate_release_notes: true
          overwrite_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  bottle:
    name: Build Homebrew bottle (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs:
      - resolve
      - release
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        os:
          - macos-14
          - macos-15-intel
          - ubuntu-latest
    env:
      TAG: ${{ needs.resolve.outputs.tag }}
      VERSION: ${{ needs.resolve.outputs.version }}
    steps:
      - name: Check Homebrew tap configuration
        id: homebrew_gate
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${HOMEBREW_TAP_TOKEN}" ] || [ -z "${HOMEBREW_TAP}" ]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "HOMEBREW_TAP/HOMEBREW_TAP_TOKEN not set; skipping bottle build."
            exit 0
          fi

          if ! [[ "${HOMEBREW_TAP}" =~ ^[A-Za-z0-9_.-]+/[A-Za-z0-9_.-]+$ ]]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "HOMEBREW_TAP must be in 'owner/repo' form; got '${HOMEBREW_TAP}'."
            exit 0
          fi

          TAP_URL="https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/${HOMEBREW_TAP}.git"
          if git ls-remote --exit-code "$TAP_URL" > /dev/null 2>&1; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "Cannot access tap repo '${HOMEBREW_TAP}'; skipping bottle build."
          fi

      - name: Set up Homebrew (Linux)
        if: ${{ runner.os == 'Linux' && steps.homebrew_gate.outputs.enabled == 'true' }}
        uses: Homebrew/actions/setup-homebrew@master

      - name: Fix Homebrew vendor bundle permissions (Linux)
        if: ${{ runner.os == 'Linux' && steps.homebrew_gate.outputs.enabled == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          BREW_REPO="$(brew --repo)"
          BUNDLE_DIR="${BREW_REPO}/Library/Homebrew/vendor/bundle"
          if [ -d "$BUNDLE_DIR" ]; then
            sudo chmod +t "$BUNDLE_DIR"
            find "$BUNDLE_DIR" -type d -path "*/gems" -print0 | xargs -0 sudo chmod +t
          fi

      - name: Compute source tarball sha256
        id: source_sha
        if: ${{ steps.homebrew_gate.outputs.enabled == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ needs.resolve.outputs.tag }}"
          URL="https://github.com/${{ github.repository }}/archive/refs/tags/${TAG}.tar.gz"
          curl -L "$URL" -o source.tar.gz
          SHA="$(shasum -a 256 source.tar.gz | awk '{print $1}')"
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"

      - name: Checkout source
        uses: actions/checkout@v4
        if: ${{ steps.homebrew_gate.outputs.enabled == 'true' }}

      - name: Checkout tap repository
        uses: actions/checkout@v4
        if: ${{ steps.homebrew_gate.outputs.enabled == 'true' }}
        with:
          repository: ${{ env.HOMEBREW_TAP }}
          token: ${{ env.HOMEBREW_TAP_TOKEN }}
          path: tap

      - name: Write formula for bottle build
        if: ${{ steps.homebrew_gate.outputs.enabled == 'true' }}
        shell: bash
        env:
          SOURCE_SHA: ${{ steps.source_sha.outputs.sha }}
        run: |
          set -euo pipefail
          cat > tap/Formula/oscleaner.rb <<'EOF'
          # typed: false
          # frozen_string_literal: true

          class Oscleaner < Formula
            desc "Cross-platform system cleanup CLI"
            homepage "https://github.com/hebertcisco/oscleaner"
            url "https://github.com/hebertcisco/oscleaner/archive/refs/tags/TAG_PLACEHOLDER.tar.gz"
            sha256 "SOURCE_SHA_PLACEHOLDER"
            license "MIT"
            head "https://github.com/hebertcisco/oscleaner.git", branch: "main"

            depends_on "rust" => :build

            def install
              system "cargo", "install", *std_cargo_args
            end

            test do
              assert_match "oscleaner", shell_output("#{bin}/oscleaner --help")
            end
          end
          EOF

          python - <<'PY'
          import os
          from pathlib import Path

          path = Path("tap/Formula/oscleaner.rb")
          text = path.read_text()
          text = text.replace("TAG_PLACEHOLDER", os.environ["TAG"])
          text = text.replace("SOURCE_SHA_PLACEHOLDER", os.environ["SOURCE_SHA"])
          path.write_text(text)
          PY

      - name: Build bottle
        if: ${{ steps.homebrew_gate.outputs.enabled == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          ROOT_URL="https://github.com/${{ github.repository }}/releases/download/${TAG}"
          brew tap "${{ env.HOMEBREW_TAP }}" ./tap
          TAP_DIR="$(brew --repo "${{ env.HOMEBREW_TAP }}")"
          cp ./tap/Formula/oscleaner.rb "$TAP_DIR/Formula/oscleaner.rb"
          brew install --build-bottle "${{ env.HOMEBREW_TAP }}/oscleaner"
          brew bottle --json --root-url "$ROOT_URL" "${{ env.HOMEBREW_TAP }}/oscleaner"

      - name: Upload bottle artifacts
        if: ${{ steps.homebrew_gate.outputs.enabled == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: bottle-${{ matrix.os }}
          path: |
            *.bottle.json
            *.bottle.tar.gz
          if-no-files-found: error

      - name: Upload bottles to GitHub release
        if: ${{ steps.homebrew_gate.outputs.enabled == 'true' && env.TAG != '' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG }}
          files: |
            *.bottle.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-homebrew:
    name: Publish Homebrew tap
    runs-on: ubuntu-latest
    needs:
      - resolve
      - release
      - bottle
    steps:
      - name: Download build artifacts for Homebrew
        if: ${{ env.HOMEBREW_TAP_TOKEN != '' && env.HOMEBREW_TAP != '' }}
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Collect artifact URLs and SHAs
        id: brew_artifacts
        if: ${{ env.HOMEBREW_TAP_TOKEN != '' && env.HOMEBREW_TAP != '' }}
        run: |
          set -euo pipefail
          TAG="${{ needs.resolve.outputs.tag }}"
          VERSION="${{ needs.resolve.outputs.version }}"
          BASE_URL="https://github.com/${{ github.repository }}/releases/download/${TAG}"

          filename="oscleaner-v${VERSION}-x86_64-unknown-linux-gnu.tar.gz"
          path=$(find artifacts -type f -name "$filename" -print -quit)
          if [ -z "$path" ]; then
            echo "::error::Missing expected artifact '$filename'." >&2
            echo "Artifacts found:"
            find artifacts -type f | sed 's/^/  /'
            exit 1
          fi

          sha=$(sha256sum "$path" | awk '{print $1}')
          echo "linux_url=$BASE_URL/$filename" >> "$GITHUB_OUTPUT"
          echo "linux_sha=$sha" >> "$GITHUB_OUTPUT"

      - name: Merge bottle metadata
        id: bottle_meta
        if: ${{ env.HOMEBREW_TAP_TOKEN != '' && env.HOMEBREW_TAP != '' }}
        run: |
          set -euo pipefail
          jsons=$(find artifacts -type f -name "*.bottle.json")
          if [ -z "$jsons" ]; then
            echo "::error::Missing bottle json metadata." >&2
            find artifacts -type f | sed 's/^/  /'
            exit 1
          fi

          jq -s '
            def root_urls:
              [ .. | objects | .root_url? | select(type == "string" and . != "") ];
            def sha_entries:
              [ .. | objects | select(.sha256? != null)
                | if (.sha256 | type) == "object" then
                    (.sha256 | to_entries[] | {key: .key, value: .value})
                  else empty end
              ];
            def file_entries:
              [ .. | objects | select(.files? != null)
                | (.files | to_entries[] | {key: .key, value: .value.sha256})
              ];
            def tag_entries:
              [ .. | objects | select(.tags? != null)
                | (.tags | to_entries[] | {key: .key, value: .value.sha256})
              ];
            def entries: (sha_entries + file_entries + tag_entries | map(select(.value != null)));
            if (entries | length) == 0 then
              error("No bottle metadata found in artifacts")
            else
              {
                root_url: (root_urls[0] // ""),
                sha256: (reduce entries[] as $e ({}; . + {($e.key): $e.value}))
              }
            end
          ' $jsons > bottle.json

          root_url=$(jq -r '.root_url' bottle.json)
          echo "root_url=$root_url" >> "$GITHUB_OUTPUT"

          jq -r '.sha256 | to_entries[] | "\(.key)=\(.value)"' bottle.json | sort > bottle-sha.txt

      - name: Checkout tap repository
        if: ${{ env.HOMEBREW_TAP_TOKEN != '' && env.HOMEBREW_TAP != '' }}
        uses: actions/checkout@v4
        with:
          repository: ${{ env.HOMEBREW_TAP }}
          token: ${{ env.HOMEBREW_TAP_TOKEN }}
          path: tap

      - name: Compute source tarball sha256
        id: source_sha
        if: ${{ env.HOMEBREW_TAP_TOKEN != '' && env.HOMEBREW_TAP != '' }}
        run: |
          set -euo pipefail
          TAG="${{ needs.resolve.outputs.tag }}"
          URL="https://github.com/${{ github.repository }}/archive/refs/tags/${TAG}.tar.gz"
          curl -L "$URL" -o source.tar.gz
          SHA="$(sha256sum source.tar.gz | awk '{print $1}')"
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"

      - name: Update formula in tap
        if: ${{ env.HOMEBREW_TAP_TOKEN != '' && env.HOMEBREW_TAP != '' }}
        env:
          SOURCE_SHA: ${{ steps.source_sha.outputs.sha }}
          LINUX_URL: ${{ steps.brew_artifacts.outputs.linux_url }}
          LINUX_SHA: ${{ steps.brew_artifacts.outputs.linux_sha }}
          BOTTLE_ROOT_URL: ${{ steps.bottle_meta.outputs.root_url }}
        run: |
          set -euo pipefail
          TAG="${{ needs.resolve.outputs.tag }}"
          VERSION="${{ needs.resolve.outputs.version }}"
          mkdir -p tap/Formula

          {
            echo "# typed: false"
            echo "# frozen_string_literal: true"
            echo
            echo "class Oscleaner < Formula"
            echo "  desc \"Cross-platform system cleanup CLI\""
            echo "  homepage \"https://github.com/hebertcisco/oscleaner\""
            echo "  url \"https://github.com/hebertcisco/oscleaner/archive/refs/tags/${TAG}.tar.gz\""
            echo "  sha256 \"${SOURCE_SHA}\""
            echo "  license \"MIT\""
            echo "  head \"https://github.com/hebertcisco/oscleaner.git\", branch: \"main\""
            echo
            if [ -s bottle-sha.txt ]; then
              echo "  bottle do"
              while IFS='=' read -r key value; do
                printf "    sha256 cellar: :any_skip_relocation, %-12s \"%s\"\n" "${key}:" "${value}"
              done < bottle-sha.txt
              echo "  end"
              echo
            fi
            echo "  depends_on \"rust\" => :build"
            echo
            echo "  def install"
            echo "    system \"cargo\", \"install\", *std_cargo_args"
            echo "  end"
            echo
            echo "  test do"
            echo "    assert_match \"oscleaner\", shell_output(\"#{bin}/oscleaner --help\")"
            echo "  end"
            echo "end"
          } > tap/Formula/oscleaner.rb

      - name: Commit and push tap update
        if: ${{ env.HOMEBREW_TAP_TOKEN != '' && env.HOMEBREW_TAP != '' }}
        run: |
          set -euo pipefail
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/oscleaner.rb
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "Update oscleaner formula to v${{ needs.resolve.outputs.version }}"
          git push origin HEAD
